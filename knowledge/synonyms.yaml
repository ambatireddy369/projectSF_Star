# synonyms.yaml — Query expansion for skill retrieval
#
# PURPOSE:
#   Maps practitioner vocabulary → canonical skill terms.
#   Used by search_knowledge.py to expand queries before lexical matching.
#   Prevents retrieval failure when a user's words don't match the skill's words.
#
# FORMAT:
#   canonical: the term used in SKILL.md files
#   synonyms: list of alternative phrases a practitioner might type
#
# RULES:
#   - Canonical terms must match actual words/phrases in skills/
#   - Synonyms are case-insensitive at query time
#   - Add new entries when search_knowledge.py returns no results for a
#     real practitioner query — that's the signal a synonym is missing
#   - Do not add generic English synonyms — only Salesforce-context mappings

